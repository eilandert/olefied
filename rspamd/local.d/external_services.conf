# local.d/external_services.conf — point rspamd's native oletools backend at
# olefied (the pooled, timeout-guarded olefy). olefied speaks the unmodified
# olefy wire protocol, so rspamd needs NO custom plugin here: the built-in
# `external_services` oletools client does the work. Drop this in
# /etc/rspamd/local.d/ and reload (`docker kill -s HUP rspamd`).
#
# Reference config for the olefied repo; the live mailscreen copy lives on the
# host at /opt/docker/mailscreen/config/rspamd/local.d/external_services.conf.

oletools {
  # olefied host:port. Use the container's IPv4, NOT its service name: on the
  # mailscreen stack rspamd's resolver is the RBL-only unbound, which cannot
  # resolve docker names (same gotcha as the DRP/yara backends). On a stack
  # whose rspamd uses a normal resolver, "olefy:10050" is fine.
  servers = "172.30.0.41:10050";

  # extended = full olevba detail (macro flags), not just a yes/no.
  extended = true;
  # scan each MIME part; still set explicitly (no-op on rspamd >= 1.9.5, kept
  # for clarity / older builds).
  scan_mime_parts = true;
  log_clean = true;

  # --- performance / stability (added over the stock config) ----------------
  # Don't ship oversized parts to olevba; office macro docs are small and
  # olefied caps at 50 MiB anyway. Saves a pointless upload + scan.
  max_size = 10485760;        # 10 MiB
  # Bound the rspamd-side wait so a wedged scan can't pin the symbol. Keep it
  # BELOW rspamd's global task_timeout (15s on this stack) or the task timeout
  # cuts olevba mid-scan; still well above a normal olevba run (sub-second to a
  # few s). olefied also kills+respawns a worker past OLEFIED_REQUEST_TIMEOUT.
  timeout = 12.0;
  # One try: olevba is deterministic, a retransmit just doubles load on a
  # transient error (this is exactly what made the old razor service burn +9s).
  retransmits = 1;
  # rspamd-side result cache keyed by content: a repeated attachment skips even
  # the network hop to olefied. Mirrors olefied's own Redis TTL.
  cache_expire = 86400;       # 1 day

  # extended-mode flag combinations -> a scorable symbol. olevba reports the
  # macro/indicator flags as a string of A/M/S/etc.; this names the common
  # "has macros + suspicious + IOC" shape so it can be weighted in
  # external_services_group.conf below.
  patterns {
    OFFICE_MACRO_FLAGS = '^MAS.....$';
  }

  # only scan parts that look like Office documents — by content-type...
  mime_parts_filter_regex {
    DOC2 = "application\/msword";
    DOC3 = "application\/vnd\.ms-word.*";
    XLS = "application\/vnd\.ms-excel.*";
    PPT = "application\/vnd\.ms-powerpoint.*";
    GENERIC = "application\/vnd\.openxmlformats-officedocument.*";
  }
  # ...and by filename extension (no regex).
  mime_parts_filter_ext {
    doc = "doc"; dot = "dot"; docx = "docx"; dotx = "dotx"; docm = "docm"; dotm = "dotm";
    xls = "xls"; xlt = "xlt"; xla = "xla"; xlsx = "xlsx"; xltx = "xltx"; xlsm = "xlsm";
    xltm = "xltm"; xlam = "xlam"; xlsb = "xlsb";
    ppt = "ppt"; pot = "pot"; pps = "pps"; ppa = "ppa"; pptx = "pptx"; potx = "potx";
    ppsx = "ppsx"; ppam = "ppam"; pptm = "pptm"; potm = "potm"; ppsm = "ppsm";
  }
}
