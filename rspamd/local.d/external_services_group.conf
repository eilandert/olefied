# local.d/external_services_group.conf — scores for the oletools symbols.
#
# How oletools scoring works: with extended = true, olefied's olevba analysis is
# turned by rspamd into a FLAG STRING per document, and the `patterns` block in
# external_services.conf matches a regex against that string to raise a symbol.
# The letters (olevba indicator categories):
#   M = has VBA macros        A = AutoExec (runs on open/close)
#   S = Suspicious keyword    I = IOC (URL/IP/path)
#   H = hex strings           B = base64 strings   E = encoded/encrypted
# So OFFICE_MACRO_FLAGS = '^MAS.....$' fires on "macros + autoexec + suspicious"
# — the classic maldoc shape. A doc with only `M` (plain macros, no autoexec, no
# suspicious calls) does NOT match, so legitimate macro documents aren't punished.
#
# Scoring philosophy: a macro is not spam. Autoexec + suspicious IS a strong
# malware signal but still not a certainty (some legit templates autorun), so it
# nudges hard rather than rejecting alone. Tune to your mail.
group "oletools" {
  description = "Office macro / maldoc analysis via olefied (olevba)";
  max_score = 12;            # ceiling on this group's combined contribution

  symbols {
    "OFFICE_MACRO_FLAGS" {
      weight = 6.0;          # macro + autoexec + suspicious = likely maldoc
      description = "Office doc has auto-executing, suspicious VBA macros";
    }
  }
}
