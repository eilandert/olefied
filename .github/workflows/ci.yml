name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # weekly rebuild — catches an upstream base-image / oletools regression
    - cron: '0 6 * * 1'

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 5
    env:
      OLEFIED_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install ruff redis
      - name: ruff
        run: ruff check docker/olefyd.py tests/
      - name: dispatcher tests (stub worker, no oletools) + cache test (redis)
        run: python tests/test_olefied.py

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image (pull olefy.py + requirements fresh from upstream)
        run: docker build --build-arg CACHEBUST="${{ github.run_id }}-${{ github.run_attempt }}" -f docker/Dockerfile -t olefied:ci .
      - name: run container
        run: |
          docker run -d --name olefied-ci \
            --tmpfs /tmp:rw,mode=1777 \
            -e OLEFIED_WORKERS=2 -p 127.0.0.1:10050:10050 olefied:ci
          for i in $(seq 1 30); do
            if printf 'PING\n\n' | nc -w2 127.0.0.1 10050 | grep -q PONG; then
              echo "ready"; break; fi
            sleep 1
          done
      - name: integration smoke (real olevba)
        run: python tests/itest_image.py 127.0.0.1 10050
      - name: healthcheck status
        run: |
          sleep 5
          test "$(docker inspect -f '{{.State.Health.Status}}' olefied-ci)" = healthy
      - name: logs on failure
        if: failure()
        run: docker logs olefied-ci
